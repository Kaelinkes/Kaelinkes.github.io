<canvas class="particle-canvas" id="particle-canvas-contact" style="position:fixed;"></canvas>

<div class="contact-page page-main">
  <div style="position:relative;z-index:1;">
    <div class="section-eyebrow" style="margin-bottom:20px">Get in touch</div>
    <div class="contact-form">
      <div class="form-row">
        <div class="form-field"><label>Name</label><input type="text" id="contact-name" placeholder="John"></div>
        <div class="form-field"><label>Surname</label><input type="text" id="contact-surname" placeholder="Doe"></div>
      </div>
      <div class="form-field"><label>Email</label><input type="email" id="contact-email" placeholder="john@example.com"></div>
      <div class="form-field"><label>Message</label><textarea rows="4" id="contact-message" placeholder="Tell me about your project..."></textarea></div>
      <button class="btn-send" onclick="submitContact()">Send Message &#8594;</button>
      <div id="contact-toast" style="display:none;margin-top:10px;font-family:var(--font-mono);font-size:10px;letter-spacing:1px;padding:10px 14px;border-radius:var(--radius);"></div>
    </div>
  </div>

  <div class="contact-right">
    <h2 class="contact-heading">Let's<br><span>connect.</span></h2>
    <div class="contact-divider"></div>
    <div>
      <p class="other-ways-label">Other ways to reach me</p>
      <div class="contact-socials">

        </a>
        <a href="#" onclick="highlightContactForm();return false;" title="Email">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
        </a>
        <a href="https://github.com/Kaelinkes" target="_blank" title="GitHub">

<script src="script.js"></script>
<script>
initParticles(['particle-canvas-contact']);

var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxAdjVuasvKDoSPX1cco2NAhiF88YhcDyyY1n1n6pwH78CQindhZCrBDbGzWiYw_r5suQ/exec';

function submitContact() {
  var name    = document.getElementById('contact-name').value.trim();
  var surname = document.getElementById('contact-surname').value.trim();
  var email   = document.getElementById('contact-email').value.trim();
  var message = document.getElementById('contact-message').value.trim();
  if (!name || !surname || !email || !message) { showToast('Please fill in all fields.', false); return; }
  var btn = document.querySelector('.btn-send');
  btn.textContent = 'Sending...'; btn.disabled = true;
  fetch(SHEETS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name:name, surname:surname, email:email, message:message })
  }).then(function() {
    showToast('✓ Message sent! I\'ll get back to you soon.', true);
    document.getElementById('contact-name').value='';
    document.getElementById('contact-surname').value='';
    document.getElementById('contact-email').value='';
    document.getElementById('contact-message').value='';
    btn.textContent='Send Message →'; btn.disabled=false;
  }).catch(function() {
    showToast('Something went wrong. Please try again.', false);
    btn.textContent='Send Message →'; btn.disabled=false;
  });
}

function showToast(msg, success) {
  var toast = document.getElementById('contact-toast');
  toast.textContent = msg; toast.style.display = 'block';
  toast.style.background = success ? 'rgba(100,200,120,0.1)' : 'rgba(220,80,80,0.1)';
  toast.style.border = '1px solid '+(success?'rgba(100,200,120,0.4)':'rgba(220,80,80,0.4)');
  toast.style.color = success ? '#7dda8f' : '#e07070';
  setTimeout(function(){ toast.style.display='none'; }, 5000);
}

function highlightContactForm() {
  var fields = [document.getElementById('contact-email'), document.getElementById('contact-message')];
  fields.forEach(function(f) {
    if (!f) return;
    f.classList.add('glow'); f.focus();
    setTimeout(function(){ f.classList.remove('glow'); }, 2000);
  });
}
</script>
</body>
</html>
