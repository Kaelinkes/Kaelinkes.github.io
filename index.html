<script>
initParticles(['particle-canvas-home']);

(function() {
  var phrases = ['am an Aspiring Software Engineer','love programming','am currently a 3rd year student','love problem solving','love coding','love learning about tech'];
  var el = document.getElementById('typing-text');
  var pi = 0, ci = 0, deleting = false, pause = 0;
  function tick() {
    var word = phrases[pi];
    if (pause > 0) { pause--; setTimeout(tick, 80); return; }
    if (!deleting) {
      el.textContent = word.substring(0, ci + 1); ci++;
      if (ci === word.length) { deleting = true; pause = 18; }
      setTimeout(tick, 85);
    } else {
      el.textContent = word.substring(0, ci - 1); ci--;
      if (ci === 0) { deleting = false; pi = (pi + 1) % phrases.length; pause = 6; }
      setTimeout(tick, 45);
    }
  }
  setTimeout(tick, 1200);
})();

ghFetch('/users/' + GH_USER + '/repos?per_page=100').then(function(r){return r.json();}).then(function(repos){
  if (!Array.isArray(repos)) return;
  var f = repos.filter(function(r){ return r.name.toLowerCase() !== GH_USER.toLowerCase(); });
  var elR = document.getElementById('stat-repos'); if (elR) elR.textContent = f.length;
  var s = f.reduce(function(sum,r){ return sum+(r.stargazers_count||0); },0);
  var elS = document.getElementById('stat-stars'); if (elS) elS.textContent = s;
}).catch(function(){});

var yr = new Date().getFullYear();
ghFetch('/search/commits?q=author:'+GH_USER+'&per_page=1').then(function(r){return r.json();}).then(function(d){
  var el=document.getElementById('stat-commits-total'); if(el&&d.total_count!==undefined) el.textContent=d.total_count>999?(Math.round(d.total_count/100)/10)+'k':d.total_count;
}).catch(function(){});
ghFetch('/search/commits?q=author:'+GH_USER+'+committer-date:'+yr+'-01-01..'+yr+'-12-31&per_page=1').then(function(r){return r.json();}).then(function(d){
  var el=document.getElementById('stat-commits-year'); if(el&&d.total_count!==undefined) el.textContent=d.total_count;
}).catch(function(){});
</script>
